<!-- SVG Avatar generado para Franco Alejandro Núñez -->
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo con gradiente -->
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo de fondo -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGradient)"/>
  
  <!-- Sombra de texto -->
  <text x="200" y="240" font-family="'Segoe UI', sans-serif" font-size="120" font-weight="700" 
        text-anchor="middle" fill="rgba(0,0,0,0.1)" transform="translate(3,3)">FN</text>
  
  <!-- Texto principal -->
  <text x="200" y="240" font-family="'Segoe UI', sans-serif" font-size="120" font-weight="700" 
        text-anchor="middle" fill="url(#textGradient)">FN</text>
  
  <!-- Detalles decorativos -->
  <circle cx="350" cy="100" r="8" fill="rgba(255,255,255,0.3)"/>
  <circle cx="80" cy="320" r="12" fill="rgba(255,255,255,0.2)"/>
  <circle cx="320" cy="320" r="6" fill="rgba(255,255,255,0.4)"/>
</svg>
